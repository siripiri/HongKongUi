<div class="bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl mb-8">
    <!-- Header with Button -->
    <div class="flex items-center justify-between p-4 border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-slate-100 border border-slate-200">
                <mat-icon class="text-slate-700 text-lg">payments</mat-icon>
            </div>
            <div>
                <h3 class="text-base font-semibold text-slate-900">Payment History</h3>
                <p class="text-xs text-slate-500">Track payment transactions</p>
            </div>
        </div>
    </div>

    <div class="overflow-x-auto max-h-[420px]">
        <table mat-table [dataSource]="dataSource" class="w-full custom-table">

            <!-- Payment Mode Column -->
            <ng-container matColumnDef="paymentMode">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Payment Mode</th>
                <td mat-cell *matCellDef="let el" class="py-4 font-semibold text-slate-900">
                    {{el.paymentMode}}
                </td>
            </ng-container>

            <!-- Amount Column -->
            <ng-container matColumnDef="amount">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider text-right">Amount</th>
                <td mat-cell *matCellDef="let el" class="text-right font-bold text-slate-900">
                    {{el.amount | currency:'INR':'symbol-narrow'}}
                </td>
            </ng-container>

            <!-- Date Column -->
            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Date</th>
                <td mat-cell *matCellDef="let el" class="text-slate-600">
                    {{el.date | date:'dd/MM/yyyy'}}
                </td>
            </ng-container>

            <!-- Note Column -->
            <ng-container matColumnDef="note">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Note</th>
                <td mat-cell *matCellDef="let el" class="text-slate-600">
                    {{el.note}}
                </td>
            </ng-container>

            <!-- Header and Data Rows -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
    </div>
</div>
