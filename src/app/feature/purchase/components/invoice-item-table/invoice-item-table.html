<div class="bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl mb-8">
    <!-- Header with Button -->
    <div class="flex items-center justify-between p-4 border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div class="p-2 rounded-lg bg-slate-100 border border-slate-200">
                <mat-icon class="text-slate-700 text-lg">inventory_2</mat-icon>
            </div>
            <div>
                <h3 class="text-base font-semibold text-slate-900">Invoice Items</h3>
                <p class="text-xs text-slate-500">Manage invoice line items</p>
            </div>
        </div>

        <button mat-flat-button color="primary" class="!h-[36px] !rounded-lg !px-3 shadow-indigo-200 shadow-sm hover:shadow-none transition-all"
                (click)="openAddItemDialog()">
            <mat-icon class="mr-1 !text-sm">add</mat-icon>
            Add Item
        </button>
    </div>

    <!-- Scroll Container -->
    <div class="overflow-y-auto max-h-[220px]"> <!-- ~4 rows -->

    <table mat-table [dataSource]="dataSource" class="w-full custom-table">

      <ng-container matColumnDef="productType">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider">
          Product Type
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-slate-600">
          {{el.productType}}
        </td>
      </ng-container>

      <ng-container matColumnDef="hsnCode">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider">
          HSN Code
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-slate-600">
          {{el.hsnCode}}
        </td>
      </ng-container>

      <ng-container matColumnDef="unit">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider text-right">
          Unit
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-right font-semibold text-slate-900">
          {{el.unit}}
        </td>
      </ng-container>

      <ng-container matColumnDef="unitPrice">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider text-right">
          Price
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-right font-semibold text-slate-900">
          {{el.unitPrice | currency:'INR':'symbol-narrow'}}
        </td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider text-right">
          Qty
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-right font-semibold text-slate-900">
          {{el.quantity}}
        </td>
      </ng-container>

      <ng-container matColumnDef="discount">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider text-right">
          Disc
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-right text-slate-700">
          {{el.discount | currency:'INR':'symbol-narrow'}}
        </td>
      </ng-container>

      <ng-container matColumnDef="taxableAmount">
        <th mat-header-cell *matHeaderCellDef
            class="!bg-slate-100 sticky top-0 z-10 py-3 text-slate-500 uppercase text-[11px] tracking-wider text-right">
          Taxable Amount
        </th>
        <td mat-cell *matCellDef="let el" class="py-2 text-sm text-right text-slate-700">
          {{el.taxableAmount}}
        </td>
      </ng-container>

      <!-- Rows -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row 
          *matRowDef="let row; columns: displayedColumns;"
          class="hover:bg-slate-50 transition">
      </tr>

    </table>

  </div>
</div>
