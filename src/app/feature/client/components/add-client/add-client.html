<div class="p-6 max-w-2xl">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <div class="p-2.5 rounded-xl bg-slate-100 border border-slate-200">
            <mat-icon class="text-slate-700 text-[22px]">person_add</mat-icon>
        </div>
        <div>
            <h2 class="text-xl font-semibold text-slate-900">Add Client Details</h2>
            <p class="text-sm text-slate-500">Enter client details</p>
        </div>
    </div>

    <form [formGroup]="clientForm" (ngSubmit)="onSave()" class="grid gap-4">
        <div class="grid gap-3 sm:grid-cols-2">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Company Name</mat-label>
                <input matInput formControlName="companyName" type="text" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>GST No</mat-label>
                <input matInput formControlName="gst" type="text" />
            </mat-form-field>
        </div>

        <div class="rounded-xl border border-slate-200 bg-slate-50 p-4" formGroupName="address">
            <h3 class="text-sm font-semibold text-slate-900 mb-3">Address</h3>
            <div class="grid gap-3">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Street 1</mat-label>
                    <input matInput formControlName="street1" type="text" />
                </mat-form-field>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Street 2</mat-label>
                    <input matInput formControlName="street2" type="text" />
                </mat-form-field>
                <div class="grid gap-3 sm:grid-cols-2">
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>City</mat-label>
                        <input matInput formControlName="city" type="text" />
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>State</mat-label>
                        <input matInput formControlName="state" type="text" />
                    </mat-form-field>
                </div>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Pincode</mat-label>
                    <input matInput formControlName="pincode" type="text" />
                </mat-form-field>
            </div>
        </div>

        <div class="grid gap-3 sm:grid-cols-2">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email" type="email" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Phone Number</mat-label>
                <input matInput formControlName="phoneNumber" type="tel" />
            </mat-form-field>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
            
            <button mat-flat-button type="button" (click)="onCancel()"
                    class="px-6 py-2 text-slate-600 hover:bg-slate-50 !rounded-lg">
                <mat-icon class="mr-2">close</mat-icon>
                Cancel
            </button>

            <button mat-flat-button color="primary" type="submit"
                    [disabled]="!clientForm.valid"
                    class="px-6 py-2 shadow-indigo-200 shadow-lg hover:shadow-none !rounded-lg">
                <mat-icon class="mr-2">save</mat-icon>
                Save Item
            </button>

        </div>
    </form>
</div>
