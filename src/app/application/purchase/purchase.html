<div class="mb-8 transition-all duration-300 hover:translate-y-[-2px]">
    <app-header-cards [cardContents]="headerCards"></app-header-cards>
</div>

<div
    class="flex flex-wrap lg:flex-nowrap items-center gap-3 bg-white/90 backdrop-blur-md border border-slate-200 p-3 rounded-xl shadow-sm mb-6 transition-all hover:border-slate-300">

    <div class="hidden lg:flex items-center justify-center px-3 border-r border-slate-200 text-slate-400">
        <mat-icon class="!text-xl">filter_alt</mat-icon>
    </div>

    <mat-form-field appearance="outline" class="w-full lg:w-44" subscriptSizing="dynamic">
        <mat-label>From</mat-label>
        <input matInput [matDatepicker]="fromPicker" [(ngModel)]="dateFrom">
        <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
        <mat-datepicker #fromPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full lg:w-44" subscriptSizing="dynamic">
        <mat-label>To</mat-label>
        <input matInput [matDatepicker]="toPicker" [(ngModel)]="dateTo">
        <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
        <mat-datepicker #toPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full lg:flex-1 min-w-[150px]" subscriptSizing="dynamic">
        <mat-label>Client</mat-label>
        <input matInput [(ngModel)]="clientName" placeholder="Search...">
        <mat-icon matPrefix class="text-slate-400 mr-2 !text-lg">search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full lg:w-40" subscriptSizing="dynamic">
        <mat-label>Status</mat-label>
        <mat-select [(ngModel)]="status">
            <mat-option value="paid">Paid</mat-option>
            <mat-option value="pending">Pending</mat-option>
            <mat-option value="overdue">Overdue</mat-option>
        </mat-select>
    </mat-form-field>

    <div class="flex items-center gap-2 ml-auto">
        <button mat-flat-button color="primary"
            class="!h-[48px] !rounded-lg !px-6 shadow-indigo-200 shadow-lg hover:shadow-none transition-all"
            (click)="search()">
            Apply
        </button>

        <button mat-icon-button
            class="!h-[48px] !w-[48px] !rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50"
            matTooltip="Reset">
            <mat-icon>refresh</mat-icon>
        </button>
    </div>
</div>

<div class="bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl mb-8">
    <div class="overflow-x-auto">
        <table mat-table [dataSource]="dataSource" class="w-full custom-table">

            <ng-container matColumnDef="invoiceNo">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Invoice No</th>
                <td mat-cell *matCellDef="let el" class="py-4 font-semibold text-slate-900">
                    #{{el.invoiceNo}}
                </td>
            </ng-container>

            <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Date</th>
                <td mat-cell *matCellDef="let el" class="text-slate-600">
                    {{el.date | date:'mediumDate'}}
                </td>
            </ng-container>

            <ng-container matColumnDef="dueDate">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Due Date</th>
                <td mat-cell *matCellDef="let el" class="text-slate-400">
                    {{el.dueDate | date:'mediumDate'}}
                </td>
            </ng-container>

            <ng-container matColumnDef="client">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider">Client</th>
                <td mat-cell *matCellDef="let el" class="font-medium text-slate-700">
                    {{el.client}}
                </td>
            </ng-container>

            <ng-container matColumnDef="amount">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider text-right">Amount</th>
                <td mat-cell *matCellDef="let el" class="text-right font-bold text-slate-900">
                    {{el.amount | currency:'INR':'symbol-narrow'}}
                </td>
            </ng-container>

            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider text-center">Status</th>
                <td mat-cell *matCellDef="let el" class="text-center">
                    <span class="px-4 py-1.5 rounded-lg text-[11px] font-bold uppercase tracking-tight" [ngClass]="{
                'bg-emerald-100 text-emerald-700': el.status === 'paid',
                'bg-amber-100 text-amber-700': el.status === 'pending',
                'bg-rose-100 text-rose-700': el.status === 'overdue'
              }">
                        {{el.status}}
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef
                    class="!bg-slate-100 py-5 text-slate-500 uppercase text-xs tracking-wider text-center">Action</th>
                <td mat-cell *matCellDef="let el" class="text-center">
                    <div class="flex gap-1 justify-center">
                        <button mat-icon-button class="text-slate-400 hover:text-indigo-600 transition-colors"
                            (click)="view(el)" matTooltip="View">
                            <mat-icon class="!text-[20px]">visibility</mat-icon>
                        </button>
                        <button mat-icon-button class="text-slate-400 hover:text-emerald-600 transition-colors"
                            (click)="edit(el)" matTooltip="Edit">
                            <mat-icon class="!text-[20px]">edit_note</mat-icon>
                        </button>
                        <button mat-icon-button class="text-slate-400 hover:text-rose-600 transition-colors"
                            (click)="delete(el)" matTooltip="Delete">
                            <mat-icon class="!text-[20px]">delete_outline</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
            </tr>

        </table>
    </div>

    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons class="!bg-white py-2">
    </mat-paginator>
</div>
