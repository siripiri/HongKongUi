<div class="p-6 max-w-2xl">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
        <div class="p-2.5 rounded-xl bg-slate-100 border border-slate-200">
            <mat-icon class="text-slate-700 text-[22px]">add_shopping_cart</mat-icon>
        </div>
        <div>
            <h2 class="text-xl font-semibold text-slate-900">Add Invoice Item</h2>
            <p class="text-sm text-slate-500">Enter item details for the invoice</p>
        </div>
    </div>

    <!-- Form -->
    <form [formGroup]="itemForm" (ngSubmit)="onSave()" class="space-y-4">
        <!-- Row 1: Product Type & Price -->
        <div class="grid grid-cols-2 gap-4">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Product Type</mat-label>
                <input matInput formControlName="productType" placeholder="Enter product name">
                <mat-icon matPrefix class="text-slate-400 mr-2">inventory_2</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Price</mat-label>
                <input matInput type="number" formControlName="price" placeholder="0.00"
                       (input)="calculateAmount()">
                <span matPrefix>₹</span>
            </mat-form-field>
        </div>

        <!-- Row 2: Quantity & Discount -->
        <div class="grid grid-cols-2 gap-4">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Quantity</mat-label>
                <input matInput type="number" formControlName="quantity" placeholder="1"
                       (input)="calculateAmount()">
                <mat-icon matPrefix class="text-slate-400 mr-2">tag</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Discount (%)</mat-label>
                <input matInput type="number" formControlName="discount" placeholder="0"
                       (input)="calculateAmount()">
                <span matSuffix>%</span>
            </mat-form-field>
        </div>

        <!-- Row 3: SGST & CGST -->
        <div class="grid grid-cols-2 gap-4">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>SGST (%)</mat-label>
                <input matInput type="number" formControlName="sgst" placeholder="0">
                <span matSuffix>%</span>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>CGST (%)</mat-label>
                <input matInput type="number" formControlName="cgst" placeholder="0">
                <span matSuffix>%</span>
            </mat-form-field>
        </div>

        <!-- Row 4: TGST & Amount -->
        <div class="grid grid-cols-2 gap-4">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>TGST (%)</mat-label>
                <input matInput type="number" formControlName="tgst" placeholder="0">
                <span matSuffix>%</span>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Total Amount</mat-label>
                <input matInput type="number" formControlName="amount" readonly>
                <span matPrefix>₹</span>
            </mat-form-field>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
            <button mat-stroked-button type="button" (click)="onCancel()"
                    class="px-6 py-2 text-slate-600 hover:bg-slate-50">
                <mat-icon class="mr-2">close</mat-icon>
                Cancel
            </button>

            <button mat-flat-button color="primary" type="submit"
                    [disabled]="!itemForm.valid"
                    class="px-6 py-2 shadow-indigo-200 shadow-lg hover:shadow-none">
                <mat-icon class="mr-2">save</mat-icon>
                Save Item
            </button>
        </div>
    </form>
</div>
